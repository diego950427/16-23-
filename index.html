<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日本韓國自由行互動行程表</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --panel: #ffffff;
      --ink: #202423;
      --muted: #69706d;
      --line: #dfe4dd;
      --accent: #1f7a6d;
      --accent-2: #d95f43;
      --accent-3: #2f5f9f;
      --soft: #e9f3ef;
      --warn: #fff1d8;
      --shadow: 0 16px 40px rgba(34, 45, 40, .10);
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    button, input, textarea, select { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 7px;
      padding: 8px 10px;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    .primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .primary:hover { color: white; filter: brightness(.96); }
    .danger:hover { border-color: var(--accent-2); color: var(--accent-2); }
    .app {
      display: grid;
      grid-template-columns: 270px minmax(0, 1fr) 350px;
      min-height: 100vh;
    }
    aside, .detail {
      background: var(--panel);
      border-color: var(--line);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    aside { border-right: 1px solid var(--line); }
    .detail { border-left: 1px solid var(--line); }
    .brand {
      padding: 22px 18px 16px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      font-size: 22px;
      line-height: 1.25;
      margin: 0 0 8px;
      letter-spacing: 0;
    }
    .brand p, .muted {
      color: var(--muted);
      margin: 0;
      line-height: 1.55;
      font-size: 14px;
    }
    .tools {
      padding: 14px 18px;
      display: grid;
      gap: 8px;
      border-bottom: 1px solid var(--line);
    }
    .tools input, .field input, .field textarea, .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
    }
    .field textarea { min-height: 78px; resize: vertical; }
    .day-list {
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .day-tab {
      width: 100%;
      text-align: left;
      padding: 11px 12px;
      display: grid;
      gap: 2px;
      border-radius: var(--radius);
    }
    .day-tab.active {
      background: var(--soft);
      border-color: var(--accent);
      color: var(--ink);
    }
    .day-tab b { font-size: 15px; }
    .day-tab span { font-size: 13px; color: var(--muted); }
    main {
      min-width: 0;
      padding: 22px 24px 36px;
    }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }
    .title-block h2 {
      margin: 0 0 6px;
      font-size: 28px;
      letter-spacing: 0;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 18px 0;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
    }
    .stat strong { display: block; font-size: 24px; }
    .stat span { color: var(--muted); font-size: 13px; }
    .section {
      margin-top: 20px;
    }
    .section h3 {
      font-size: 18px;
      margin: 0 0 10px;
    }
    .route {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
    }
    .route-line {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      line-height: 1.6;
    }
    .route-chip {
      background: #eef3fa;
      color: #244f85;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 13px;
    }
    .route-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .map-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 7px 10px;
      color: var(--ink);
      text-decoration: none;
      background: #fff;
      font-size: 14px;
    }
    .map-link.primary {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }
    .route-map {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px;
      margin: 12px 0;
    }
    .route-stop {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfa;
      color: var(--ink);
      text-decoration: none;
      padding: 10px;
      min-height: 82px;
      position: relative;
    }
    .route-stop::after {
      content: "→";
      position: absolute;
      right: -14px;
      top: 30px;
      color: var(--muted);
      font-weight: 700;
    }
    .route-stop:last-child::after { content: ""; }
    .stop-index {
      display: inline-grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .route-stop b {
      display: block;
      font-size: 14px;
      line-height: 1.35;
    }
    .route-stop span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }
    .leg-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }
    .leg-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      background: #fff;
    }
    .leg-card h4 {
      margin: 0 0 6px;
      font-size: 15px;
    }
    .leg-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 13px;
    }
    .leg-tools {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      min-width: 180px;
    }
    .mini-link {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 8px;
      color: var(--ink);
      text-decoration: none;
      background: #fbfcfa;
      font-size: 12px;
      white-space: nowrap;
    }
    .timeline {
      position: relative;
      display: grid;
      gap: 12px;
    }
    .item {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 8px 20px rgba(34,45,40,.05);
      padding: 13px;
      display: grid;
      grid-template-columns: 84px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }
    .time {
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }
    .item h4 {
      margin: 0 0 5px;
      font-size: 17px;
      letter-spacing: 0;
    }
    .item p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 9px;
    }
    .badge {
      font-size: 12px;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      background: #fbfcfa;
    }
    .badge.todo { background: var(--warn); color: #8a5a16; border-color: #f2d39b; }
    .badge.food { background: #fff0ee; color: #9a4934; border-color: #f0c2b5; }
    .badge.shop { background: #eef3ff; color: #31598e; border-color: #cbd8f2; }
    .badge.hotel { background: #eef8f2; color: #27734b; border-color: #c7e5d3; }
    .icon-btn {
      width: 34px;
      height: 34px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-size: 16px;
    }
    .detail-head, .editor {
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }
    .detail-head h3 { margin: 0 0 7px; font-size: 20px; }
    .form {
      padding: 18px;
      display: grid;
      gap: 12px;
    }
    .field label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .notes {
      padding: 18px;
      display: grid;
      gap: 10px;
    }
    .note {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      background: #fbfcfa;
      line-height: 1.55;
      font-size: 14px;
    }
    .empty {
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 20px;
      color: var(--muted);
      background: rgba(255,255,255,.6);
    }
    .hidden { display: none !important; }
    .file-input { display: none; }

    @media (max-width: 1100px) {
      .app { grid-template-columns: 230px minmax(0, 1fr); }
      .detail {
        grid-column: 1 / -1;
        position: static;
        height: auto;
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
    @media (max-width: 760px) {
      .app { display: block; }
      aside {
        position: static;
        height: auto;
        border-right: 0;
      }
      .day-list {
        grid-auto-flow: column;
        overflow-x: auto;
      }
      .day-tab { min-width: 180px; }
      main { padding: 18px 14px; }
      .topbar { display: grid; }
      .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .item { grid-template-columns: 1fr; }
      .item .actions { justify-content: flex-start; }
      .leg-card { grid-template-columns: 1fr; }
      .leg-tools { justify-content: flex-start; min-width: 0; }
      .route-stop::after { content: ""; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <h1>日本韓國自由行行程表</h1>
        <p>115/6/16 - 6/23，8 天 7 夜。資料已從 Word 檔預先整理，可持續新增與調整。</p>
      </div>
      <div class="tools">
        <input id="search" type="search" placeholder="搜尋景點、餐廳、備註">
        <div class="actions">
          <button id="addDay">＋日</button>
          <button id="exportJson">匯出</button>
          <button id="importJson">匯入</button>
          <button id="resetData" class="danger">重置</button>
          <input id="importFile" class="file-input" type="file" accept="application/json">
        </div>
      </div>
      <nav id="dayList" class="day-list"></nav>
    </aside>

    <main>
      <div class="topbar">
        <div class="title-block">
          <h2 id="dayTitle"></h2>
          <p id="daySubtitle" class="muted"></p>
        </div>
        <button id="addItemTop" class="primary">＋新增行程</button>
      </div>

      <div class="summary-grid">
        <div class="stat"><strong id="statItems">0</strong><span>行程項目</span></div>
        <div class="stat"><strong id="statTodos">0</strong><span>待辦/待定</span></div>
        <div class="stat"><strong id="statFood">0</strong><span>美食</span></div>
        <div class="stat"><strong id="statRoute">0</strong><span>路線點</span></div>
      </div>

      <section class="section">
        <h3>路線順序</h3>
        <div id="routeBox" class="route"></div>
      </section>

      <section class="section">
        <h3>時間軸</h3>
        <div id="timeline" class="timeline"></div>
      </section>
    </main>

    <section class="detail">
      <div class="detail-head">
        <h3>行程編輯</h3>
        <p class="muted">點選時間軸項目可編輯；新增後會自動存在這台電腦的瀏覽器。</p>
      </div>
      <form id="dayForm" class="editor">
        <div class="field">
          <label for="dayDate">日期</label>
          <input id="dayDate" placeholder="例如 6月24日(三)">
        </div>
        <div class="row" style="margin-top:12px">
          <div class="field">
            <label for="dayLabel">天數</label>
            <input id="dayLabel" placeholder="例如 第9日">
          </div>
          <div class="field">
            <label for="dayCity">目的地</label>
            <input id="dayCity" placeholder="例如 首爾">
          </div>
        </div>
        <div class="actions" style="margin-top:12px">
          <button class="primary" type="submit">儲存每日資訊</button>
          <button id="deleteDay" class="danger" type="button">刪除此日</button>
        </div>
      </form>
      <form id="itemForm" class="form">
        <input id="editingId" type="hidden">
        <div class="row">
          <div class="field">
            <label for="itemTime">時間</label>
            <input id="itemTime" placeholder="例如 09:17">
          </div>
          <div class="field">
            <label for="itemCategory">分類</label>
            <select id="itemCategory">
              <option value="交通">交通</option>
              <option value="景點">景點</option>
              <option value="美食">美食</option>
              <option value="購物">購物</option>
              <option value="住宿">住宿</option>
              <option value="待辦">待辦</option>
              <option value="備註">備註</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="itemTitle">標題</label>
          <input id="itemTitle" required placeholder="例如 門司港懷舊展望台">
        </div>
        <div class="field">
          <label for="itemPlace">地點/路線點</label>
          <input id="itemPlace" placeholder="填地名可自動產生 Google Maps 連結">
        </div>
        <div class="field">
          <label for="itemDetail">內部細節</label>
          <textarea id="itemDetail" placeholder="票價、營業時間、候位方式、備案、提醒..."></textarea>
        </div>
        <div class="field">
          <label for="itemStatus">狀態</label>
          <select id="itemStatus">
            <option value="確定">確定</option>
            <option value="待定">待定</option>
            <option value="想去">想去</option>
            <option value="已預約">已預約</option>
            <option value="必做">必做</option>
          </select>
        </div>
        <div class="actions">
          <button class="primary" type="submit">儲存</button>
          <button id="newItem" type="button">清空新增</button>
          <button id="deleteItem" class="danger hidden" type="button">刪除</button>
        </div>
      </form>
      <div class="notes">
        <div class="note">小提示：同一天的「地點/路線點」會自動整理成路線順序；每個路線點都能打開 Google Maps 搜尋。</div>
        <div class="note">匯出 JSON 可以備份，匯入 JSON 可還原或搬到另一台電腦。</div>
      </div>
    </section>
  </div>

            item("11:30", "景點", "湯布院老街、金鱗湖", "由布院站", "出站直行不遠是 B-Speak 蛋糕卷；往金鱗湖方向有咖哩可樂餅。", "確定"),
            item("", "購物", "由布院街道專賣店", "湯之坪街道", "宮崎駿、貓屋敷、熊本熊、湯布院民藝村等店家。", "想去"),
            item("17:17", "交通", "JR 回博多", "由布院站", "由布院 17:17 -> JR 博多 19:27。", "確定"),
            item("晚餐", "美食", "大東園本店或藥院燒肉", "大東園 本店", "博多區上川端町 1-1-1，靠近櫛田神社；備案：藥院燒肉。", "待定")
          ]
        },
        {
          id: "d5",
          date: "6月20日(六)",
          label: "第5日",

          items: [
            item("", "交通", "JR PASS 前往熊本", "博多站", "JR 熊本來回。", "確定"),

            item("", "購物", "上下通、鶴屋百貨", "熊本上通商店街", "上下通逛街、鶴屋百貨。", "想去"),
            item("", "購物", "AMU PLAZA、SAKURA MACHI", "SAKURA MACHI Kumamoto", "櫻町熊本與 AMU PLAZA。", "想去"),
            item("午餐", "美食", "中餐待定", "熊本", "可補餐廳。", "待定"),
            item("晚餐", "美食", "晚餐待定", "博多", "回博多後晚餐。", "待定")
          ]
        },
        {
          id: "d6",
          date: "6月21日(日)",
          label: "第6日",

          items: [

            item("", "購物", "天神地下街與百貨", "天神地下街", "連通地下鐵機場線；大丸百貨、新光三越。", "確定"),
            item("", "購物", "PARCO、MINA、ONE FUKUOKA BLDG", "福岡 PARCO", "PARCO 動漫專賣店多；MINA 有 Uniqlo/GU/LOFT/ABC Mart/Seria；ONE FUKUOKA BLDG 新開幕。", "想去"),
            item("", "美食", "天神甜點與麵包清單", "天神", "Truffle Bakery、PRESS BUTTER SAND、伊都 king、芋屋金次郎、Pain Stock、DACO。", "想去"),
            item("", "購物", "Bic Camera 電器與咖啡機", "Bic Camera 天神", "下午天神逛街與晚餐；看電器與咖啡機。", "必做"),
            item("晚上", "景點", "福岡塔夜景", "福岡塔", "門票約 1000 日幣，看夜景。", "想去"),
            item("晚餐", "美食", "水炊雞或雞肉蓋飯套餐", "博多區住吉2-46-42", "水炊雞約 2700 日幣；地址：博多區住吉 2-46-42。", "待定")
          ]
        },
        {
          id: "d7",
          date: "6月22日(一)",
          label: "第7日",
          city: "釜山、海雲台",
          items: [
            item("早餐後", "交通", "福岡機場飛釜山", "福岡機場", "早餐後去機場，搭 11 點飛機回韓國釜山。", "確定"),
            item("", "住宿", "海雲台東橫 INN 放行李", "東橫INN 釜山海雲台", "海雲台飯店放行李；慶生。", "確定"),
            item("下午", "景點", "海岸列車", "海雲台海岸列車", "下午景點：海岸列車。", "待定"),
            item("晚上", "景點", "遊艇賞夕陽煙花秀", "海雲台遊艇", "晚上搭遊艇賞夕陽煙花秀。", "想去")
          ]
        },
        {
          id: "d8",
          date: "6月23日(二)",
          label: "第8日",
          city: "釜山、台北",
          items: [
            item("早上", "住宿", "飯店早餐賞海景", "海雲台", "早上待飯店吃早餐賞海景。", "確定"),
            item("下午", "購物", "西面站逛街或南浦雪濃湯", "西面站", "下午行程待定：西面站逛街或南浦雪濃湯。", "待定"),
            item("22:00", "交通", "釜山飛台北", "金海國際機場", "晚上 10 點飛機回台北。", "確定"),
            item("6/24 11:40", "交通", "抵達台灣", "台灣桃園國際機場", "6月24日凌晨 11:40 到台灣。原文如此，請再確認實際時間。", "待定")
          ]
        }
      ]
    };

    function item(time, category, title, place, detail, status) {
      return {
        id: "i" + Math.random().toString(36).slice(2, 10),
        time, category, title, place, detail, status
      };
    }

    let trip = loadTrip();
    let activeDayId = trip.days[0]?.id;
    let query = "";

    const els = {
      dayList: document.querySelector("#dayList"),
      dayTitle: document.querySelector("#dayTitle"),
      daySubtitle: document.querySelector("#daySubtitle"),
      timeline: document.querySelector("#timeline"),
      routeBox: document.querySelector("#routeBox"),
      search: document.querySelector("#search"),
      itemForm: document.querySelector("#itemForm"),
      dayForm: document.querySelector("#dayForm"),
      dayDate: document.querySelector("#dayDate"),
      dayLabel: document.querySelector("#dayLabel"),
      dayCity: document.querySelector("#dayCity"),
      deleteDay: document.querySelector("#deleteDay"),
      editingId: document.querySelector("#editingId"),
      itemTime: document.querySelector("#itemTime"),
      itemCategory: document.querySelector("#itemCategory"),
      itemTitle: document.querySelector("#itemTitle"),
      itemPlace: document.querySelector("#itemPlace"),
      itemDetail: document.querySelector("#itemDetail"),
      itemStatus: document.querySelector("#itemStatus"),
      deleteItem: document.querySelector("#deleteItem"),
      statItems: document.querySelector("#statItems"),
      statTodos: document.querySelector("#statTodos"),
      statFood: document.querySelector("#statFood"),
      statRoute: document.querySelector("#statRoute"),
      importFile: document.querySelector("#importFile")
    };

    render();

    document.querySelector("#addItemTop").addEventListener("click", clearForm);
    document.querySelector("#newItem").addEventListener("click", clearForm);
    document.querySelector("#addDay").addEventListener("click", addDay);
    document.querySelector("#exportJson").addEventListener("click", exportJson);
    document.querySelector("#importJson").addEventListener("click", () => els.importFile.click());
    document.querySelector("#resetData").addEventListener("click", resetData);
    els.search.addEventListener("input", event => {
      query = event.target.value.trim().toLowerCase();
      render();
    });
    els.importFile.addEventListener("change", importJson);
    els.itemForm.addEventListener("submit", saveItem);
    els.dayForm.addEventListener("submit", saveDay);
    els.deleteItem.addEventListener("click", deleteItem);
    els.deleteDay.addEventListener("click", deleteDay);

    function loadTrip() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) return JSON.parse(saved);
      } catch (error) {
        console.warn(error);
      }
      return structuredClone(initialTrip);
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(trip));
    }

    function activeDay() {
      return trip.days.find(day => day.id === activeDayId) || trip.days[0];
    }

    function render() {
      renderDays();
      renderMain();
    }

    function renderDays() {
      els.dayList.innerHTML = "";
      trip.days.forEach(day => {
        const count = filteredItems(day).length;
        const btn = document.createElement("button");
        btn.className = "day-tab" + (day.id === activeDayId ? " active" : "");
        btn.innerHTML = `<b>${escapeHtml(day.date)} ${escapeHtml(day.label)}</b><span>${escapeHtml(day.city)} · ${count} 項</span>`;
        btn.addEventListener("click", () => {
          activeDayId = day.id;
          clearForm();
          render();
        });
        els.dayList.appendChild(btn);
      });
    }

    function renderMain() {
      const day = activeDay();
      if (!day) return;
      const items = filteredItems(day);
      els.dayTitle.textContent = `${day.date} ${day.label}`;
      els.daySubtitle.textContent = day.city;
      els.statItems.textContent = items.length;
      els.statTodos.textContent = items.filter(i => ["待辦", "備註"].includes(i.category) || i.status === "待定").length;
      els.statFood.textContent = items.filter(i => i.category === "美食").length;
      els.statRoute.textContent = routeItems(items).length;
      renderRoute(items);
      renderTimeline(items);
      renderDayForm(day);
    }

    function renderDayForm(day) {
      els.dayDate.value = day.date || "";
      els.dayLabel.value = day.label || "";
      els.dayCity.value = day.city || "";
      els.deleteDay.disabled = trip.days.length <= 1;
    }

    function renderRoute(items) {
      const points = routeItems(items);
      if (!points.length) {
        els.routeBox.innerHTML = `<div class="empty">這一天還沒有可形成路線的地點。替行程填入「地點/路線點」後會自動出現在這裡。</div>`;
        return;
      }
      const chips = points.map((point, index) => {
        return `<a class="route-chip" href="${mapsSearchUrl(point.place)}" target="_blank" rel="noreferrer">${index + 1}. ${escapeHtml(point.place)}</a>`;
      }).join("<span>→</span>");
      const stops = points.map((point, index) => `
        <a class="route-stop" href="${mapsSearchUrl(point.place)}" target="_blank" rel="noreferrer">
          <span class="stop-index">${index + 1}</span>
          <b>${escapeHtml(point.place)}</b>
          <span>${escapeHtml(point.time || "時間未定")} · ${escapeHtml(point.title)}</span>
        </a>
      `).join("");
      const legs = routeLegs(points).map((leg, index) => `
        <div class="leg-card">
          <div>
            <h4>${index + 1}. ${escapeHtml(leg.from.place)} → ${escapeHtml(leg.to.place)}</h4>
            <p>${escapeHtml(leg.from.time || "出發時間未定")} 出發 · ${escapeHtml(leg.to.time || "抵達時間未定")} 抵達 · ${escapeHtml(leg.window)}</p>
            <p>${escapeHtml(leg.from.title)} → ${escapeHtml(leg.to.title)}</p>
          </div>
          <div class="leg-tools">
            <a class="mini-link" href="${mapsDirectionsUrl(leg.from.place, leg.to.place, "transit")}" target="_blank" rel="noreferrer">大眾運輸</a>
            <a class="mini-link" href="${mapsDirectionsUrl(leg.from.place, leg.to.place, "walking")}" target="_blank" rel="noreferrer">步行</a>
            <a class="mini-link" href="${mapsDirectionsUrl(leg.from.place, leg.to.place, "driving")}" target="_blank" rel="noreferrer">開車</a>
          </div>
        </div>
      `).join("");
      els.routeBox.innerHTML = `
        <div class="route-actions">
          <a class="map-link primary" href="${fullDayDirectionsUrl(points, "transit")}" target="_blank" rel="noreferrer">Google Maps 全日路線</a>
          <a class="map-link" href="${fullDayDirectionsUrl(points, "walking")}" target="_blank" rel="noreferrer">步行版</a>
          <a class="map-link" href="${fullDayDirectionsUrl(points, "driving")}" target="_blank" rel="noreferrer">開車版</a>
        </div>
        <div class="route-line">${chips}</div>
        <div class="route-map">${stops}</div>
        <div class="leg-list">${legs || `<div class="empty">至少需要兩個路線點，才能產生分段交通。</div>`}</div>
      `;
    }

    function renderTimeline(items) {
      els.timeline.innerHTML = "";
      if (!items.length) {
        els.timeline.innerHTML = `<div class="empty">找不到符合搜尋的行程，或這一天還沒有項目。</div>`;
        return;
      }
      items.forEach(entry => {
        const div = document.createElement("article");
        div.className = "item";
        div.innerHTML = `
          <div class="time">${escapeHtml(entry.time || "未定")}</div>
          <div>
            <h4>${escapeHtml(entry.title)}</h4>
            <p>${escapeHtml(entry.detail || "")}</p>
            <div class="badges">
              <span class="badge ${badgeClass(entry.category)}">${escapeHtml(entry.category)}</span>
              <span class="badge">${escapeHtml(entry.status)}</span>
              ${entry.place ? `<span class="badge">${escapeHtml(entry.place)}</span>` : ""}
            </div>
          </div>
          <div class="actions">
            ${entry.place ? `<button class="icon-btn" title="開啟地圖" data-map="${escapeHtml(entry.place)}">⌖</button>` : ""}
            <button class="icon-btn" title="編輯" data-edit="${entry.id}">✎</button>
          </div>
        `;
        div.querySelector("[data-edit]")?.addEventListener("click", () => editItem(entry.id));
        div.querySelector("[data-map]")?.addEventListener("click", event => {
          const place = event.currentTarget.dataset.map;
          window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place)}`, "_blank", "noreferrer");
        });
        els.timeline.appendChild(div);
      });
    }

    function filteredItems(day) {
      const items = [...day.items].sort((a, b) => timeRank(a.time) - timeRank(b.time));
      if (!query) return items;
      return items.filter(entry => {
        const text = `${entry.time} ${entry.category} ${entry.title} ${entry.place} ${entry.detail} ${entry.status}`.toLowerCase();
        return text.includes(query);
      });
    }

    function routeItems(items) {
      const seen = new Set();
      return items.filter(entry => {
        const place = (entry.place || "").trim();
        if (!place || seen.has(place)) return false;
        seen.add(place);
        return true;
      });
    }

    function routeLegs(points) {
      return points.slice(0, -1).map((from, index) => {
        const to = points[index + 1];
        return {
          from,
          to,
          window: routeWindow(from.time, to.time)
        };
      });
    }

    function routeWindow(fromTime, toTime) {
      const from = parseClockMinutes(fromTime);
      const to = parseClockMinutes(toTime);
      if (from === null || to === null || to <= from) return "實際交通時間請用 Google Maps 查詢";
      const diff = to - from;
      const hours = Math.floor(diff / 60);
      const minutes = diff % 60;
      const label = `${hours ? `${hours} 小時 ` : ""}${minutes} 分鐘`;
      return `兩項行程間隔約 ${label}，請以 Google Maps 即時路線為準`;
    }

    function parseClockMinutes(value) {
      const match = String(value || "").match(/(\d{1,2})[:：](\d{2})/);
      if (!match) return null;
      return Number(match[1]) * 60 + Number(match[2]);
    }

    function mapsSearchUrl(place) {
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place)}`;
    }

    function mapsDirectionsUrl(origin, destination, mode = "transit") {
      return `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&travelmode=${mode}`;
    }

    function fullDayDirectionsUrl(points, mode = "transit") {
      if (points.length === 1) return mapsSearchUrl(points[0].place);
      const origin = points[0].place;
      const destination = points[points.length - 1].place;
      const waypointText = points.slice(1, -1).map(point => point.place).join("|");
      const waypoints = waypointText ? `&waypoints=${encodeURIComponent(waypointText)}` : "";
      return `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}${waypoints}&travelmode=${mode}`;
    }

    function timeRank(value) {
      if (!value) return 9999;
      const match = String(value).match(/(\d{1,2})[:：](\d{2})/);
      if (match) return Number(match[1]) * 60 + Number(match[2]);
      if (String(value).includes("早")) return 500;
      if (String(value).includes("午餐") || String(value).includes("中餐")) return 720;
      if (String(value).includes("下午")) return 850;
      if (String(value).includes("晚")) return 1100;
      return 9990;
    }

    function editItem(id) {
      const entry = activeDay().items.find(item => item.id === id);
      if (!entry) return;
      els.editingId.value = entry.id;
      els.itemTime.value = entry.time || "";
      els.itemCategory.value = entry.category || "景點";
      els.itemTitle.value = entry.title || "";
      els.itemPlace.value = entry.place || "";
      els.itemDetail.value = entry.detail || "";
      els.itemStatus.value = entry.status || "確定";
      els.deleteItem.classList.remove("hidden");
      els.itemTitle.focus();
    }

    function clearForm() {
      els.editingId.value = "";
      els.itemTime.value = "";
      els.itemCategory.value = "景點";
      els.itemTitle.value = "";
      els.itemPlace.value = "";
      els.itemDetail.value = "";
      els.itemStatus.value = "確定";
      els.deleteItem.classList.add("hidden");
      els.itemTitle.focus();
    }

    function saveItem(event) {
      event.preventDefault();
      const day = activeDay();
      const payload = {
        id: els.editingId.value || "i" + Date.now().toString(36),
        time: els.itemTime.value.trim(),
        category: els.itemCategory.value,
        title: els.itemTitle.value.trim(),
        place: els.itemPlace.value.trim(),
        detail: els.itemDetail.value.trim(),
        status: els.itemStatus.value
      };
      const index = day.items.findIndex(entry => entry.id === payload.id);
      if (index >= 0) day.items[index] = payload;
      else day.items.push(payload);
      persist();
      clearForm();
      render();
    }

    function deleteItem() {
      const id = els.editingId.value;
      if (!id) return;
      const day = activeDay();
      day.items = day.items.filter(entry => entry.id !== id);
      persist();
      clearForm();
      render();
    }

    function addDay() {
      const n = trip.days.length + 1;
      const day = {
        id: "d" + Date.now().toString(36),
        date: `新增日期`,
        label: `第${n}日`,
        city: "未設定",
        items: []
      };
      trip.days.push(day);
      activeDayId = day.id;
      persist();
      render();
    }

    function saveDay(event) {
      event.preventDefault();
      const day = activeDay();
      day.date = els.dayDate.value.trim() || "未設定日期";
      day.label = els.dayLabel.value.trim() || "未設定天數";
      day.city = els.dayCity.value.trim() || "未設定目的地";
      persist();
      render();
    }

    function deleteDay() {
      if (trip.days.length <= 1) return;
      const day = activeDay();
      if (!confirm(`確定刪除「${day.date} ${day.label}」？`)) return;
      trip.days = trip.days.filter(entry => entry.id !== day.id);
      activeDayId = trip.days[0]?.id;
      persist();
      clearForm();
      render();
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(trip, null, 2)], { type: "application/json" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "日本韓國自由行互動行程表.json";
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function importJson(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);
          if (!Array.isArray(imported.days)) throw new Error("格式不正確");
          trip = imported;
          activeDayId = trip.days[0]?.id;
          persist();
          clearForm();
          render();
        } catch (error) {
          alert("匯入失敗：JSON 格式不符合行程表。");
        }
      };
      reader.readAsText(file);
      event.target.value = "";
    }

    function resetData() {
      if (!confirm("確定要重置成 Word 檔初始版本？目前瀏覽器中的修改會被清除。")) return;
      trip = structuredClone(initialTrip);
      activeDayId = trip.days[0]?.id;
      persist();
      clearForm();
      render();
    }

    function badgeClass(category) {
      return {
        "待辦": "todo",
        "美食": "food",
        "購物": "shop",
        "住宿": "hotel"
      }[category] || "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
